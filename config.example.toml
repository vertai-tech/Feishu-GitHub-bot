# 复制为 config.toml 后填写。敏感值建议改用环境变量注入（见下方注释），不要提交到 git。
listen_addr = "0.0.0.0:8080"

[feishu]
app_id = "cli_xxxxxxxx"
# 可用环境变量 FEISHU_APP_SECRET 覆盖
app_secret = ""
# 事件订阅 Verification Token（飞书开发者后台「事件与回调」页）。可用 FEISHU_VERIFICATION_TOKEN 覆盖
verification_token = ""
# 事件订阅 Encrypt Key；未开启加密则留空。可用 FEISHU_ENCRYPT_KEY 覆盖
encrypt_key = ""
# 广播型通知（PR/Issue 创建、Issue 评论、未绑定提示）的收件人。
# notify_id_type: "union_id"（私聊，推荐）/ "open_id" / "chat_id"（群）/ "email"
notify_id_type = "union_id"
notify_id = "on_xxxxxxxx"
# 多维表格 app_token（形如 bascnxxxx 或新版 app token）
base_app_token = "bascnxxxxxxxx"
# 「绑定映射」表 table_id（形如 tblxxxx）
binding_table_id = "tblxxxxxxxx"
# 「PR跟踪」表 table_id
pr_table_id = "tblyyyyyyyy"

[github]
# webhook secret，与 GitHub org/仓库 webhook 设置里的 Secret 一致。可用 GITHUB_WEBHOOK_SECRET 覆盖
webhook_secret = ""
# 接入的 organization 名；非该 org 的事件会被忽略。留空则不限制
org = "your-org"
